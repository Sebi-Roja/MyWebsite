<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Gabriel Sebastian Rojano</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="titleblock">
  <div class="tb-grid">
    <div class="tb-cell">
      <span class="tb-label">Drawn by</span>
      <span class="tb-value">G. S. Rojano</span>
    </div>
    <nav class="tb-nav">
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="resume.html">Resume</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <div class="tb-cell">
      <span class="tb-label">Rev.</span>
      <span class="tb-value">2026</span>
    </div>
  </div>
</header>

<main class="wrap">

  <section class="hero" style="padding-bottom: 8px;">
    <p class="eyebrow">Get in touch</p>
    <h1 style="font-size: clamp(34px, 5vw, 52px);">Contact</h1>
    <p class="role">Let's talk about a project, an opportunity, or a shared interest.</p>
  </section>

  <section class="contact-grid" style="margin: 48px 0 60px;">

    <form id="contact-form">
      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit" class="btn">Send message →</button>
      <p id="form-note" style="font-family: var(--font-mono); font-size: 12px; color: var(--ink-soft); margin-top: 16px;"></p>
    </form>

    <aside class="contact-card">
      <div class="contact-item">
        <span class="tb-label">Email</span>
        <span class="tb-value">Rojano.g@northeastern.edu</span>
      </div>
      <div class="contact-item">
        <span class="tb-label">Phone</span>
        <span class="tb-value">(508) 768-7261</span>
      </div>
      <div class="contact-item">
        <span class="tb-label">LinkedIn</span>
        <span class="tb-value"><a href="https://www.linkedin.com/in/sebastian-rojano" target="_blank" rel="noopener" class="text-link" style="border:none;">/in/sebastian-rojano</a></span>
      </div>
      <div class="contact-item">
        <span class="tb-label">Based in</span>
        <span class="tb-value">Boston, MA</span>
      </div>
    </aside>

  </section>

</main>

<footer>
  <div class="wrap">
    <div class="footer-links">
      <a href="https://www.linkedin.com/in/sebastian-rojano" target="_blank" rel="noopener">LinkedIn</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</footer>

<script>
  // This is a static site with no backend, so the form opens the visitor's
  // email client pre-filled with their message instead of submitting in-page.
  // For a true in-page submission, connect this form to a service like
  // Formspree or Netlify Forms and swap out this script.
  document.getElementById('contact-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var name = document.getElementById('name').value;
    var email = document.getElementById('email').value;
    var message = document.getElementById('message').value;
    var subject = encodeURIComponent('Portfolio contact from ' + name);
    var body = encodeURIComponent(message + '\n\n— ' + name + ' (' + email + ')');
    window.location.href = 'mailto:Rojano.g@northeastern.edu?subject=' + subject + '&body=' + body;
    document.getElementById('form-note').textContent = 'Opening your email client…';
  });
</script>

</body>
</html>
